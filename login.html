<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eland CRO System</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8102e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ELAND CRO">
<link rel="apple-touch-icon" href="favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --red:#c8102e; --red-dark:#9e0c24; --red-light:#fdf0f2;
  --navy:#1a2744; --navy2:#243460;
  --bg:#f7f8fa; --surface:#ffffff;
  --border:#dde1ea; --border2:#c8cdd9;
  --text:#111827; --text2:#4b5563; --text3:#9ca3af;
  --font:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; font-family:var(--font); color:var(--text); font-size:13px;
  background:
    radial-gradient(circle at 18% 25%, rgba(200,16,46,0.18), transparent 42%),
    radial-gradient(circle at 82% 78%, rgba(255,255,255,0.05), transparent 50%),
    linear-gradient(135deg, #1a2744 0%, #243460 50%, #0f1a30 100%);
  display:flex; align-items:center; justify-content:center; padding:24px;
  position:relative; overflow:hidden;
}
/* 배경 미세 격자 */
body::before{
  content:''; position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
}
/* 우측 상단 장식 원 */
body::after{
  content:''; position:absolute; top:-180px; right:-180px;
  width:480px; height:480px; border-radius:50%;
  background: radial-gradient(circle, rgba(200,16,46,0.22) 0%, transparent 65%);
  pointer-events:none;
}

.frame{
  position:relative; z-index:1;
  width:100%; max-width:460px; background:var(--surface);
  border-radius:16px; box-shadow:0 24px 60px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.15);
  overflow:hidden;
}
/* 카드 상단 빨강 띠 */
.frame::before{
  content:''; display:block; height:5px;
  background:linear-gradient(90deg, var(--red) 0%, #e02644 50%, var(--red) 100%);
}
.frame-inner{padding:34px 38px 28px}

/* 헤더 */
.header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.logo-circle{
  width:54px; height:54px; flex-shrink:0;
  background:url('favicon.svg') center/contain no-repeat;
  border-radius:11px;
  box-shadow:0 6px 14px rgba(200,16,46,0.28);
}
.header-txt{display:flex;flex-direction:column;line-height:1.15}
.header-brand{font-size:17px;font-weight:900;color:var(--navy);letter-spacing:0.5px}
.header-sub{font-size:10.5px;font-weight:600;color:var(--red);letter-spacing:1.2px;margin-top:3px}

.intro{
  margin:18px 0 22px; padding:10px 12px;
  background:linear-gradient(90deg, var(--red-light) 0%, transparent 100%);
  border-left:3px solid var(--red); border-radius:0 6px 6px 0;
  font-size:11.5px; color:var(--text2); line-height:1.55;
}
.intro b{color:var(--navy)}

/* 탭 */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:4px}
.tab{
  flex:1;padding:11px 0;font-size:13px;font-weight:700;color:var(--text3);
  background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;
  font-family:var(--font); transition:color .15s;
}
.tab:hover{color:var(--text2)}
.tab.on{color:var(--red);border-bottom-color:var(--red)}

/* 폼 */
.field{margin-bottom:13px}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--text2);letter-spacing:0.4px;margin-bottom:5px}
.input,.sel{
  width:100%;padding:10px 12px;font-size:13px;color:var(--text);
  border:1px solid var(--border);border-radius:7px;background:#fff;
  font-family:var(--font); outline:none; transition:all .15s;
}
.input:focus,.sel:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(200,16,46,0.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.btn-primary{
  width:100%;padding:12px;margin-top:12px;font-size:13px;font-weight:700;
  background:linear-gradient(135deg, var(--red) 0%, #d61833 100%);
  color:#fff;border:none;border-radius:7px;cursor:pointer;
  font-family:var(--font); letter-spacing:0.5px;
  box-shadow:0 4px 10px rgba(200,16,46,0.25); transition:all .15s;
}
.btn-primary:hover{box-shadow:0 6px 14px rgba(200,16,46,0.35);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}

.msg{
  margin-top:12px;padding:10px 12px;font-size:11px;border-radius:6px;
  display:none; line-height:1.5;
}
.msg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;display:block}
.msg.ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;display:block}
.msg.info{background:#eff6ff;color:#1e3a8a;border:1px solid #bfdbfe;display:block}

.foot{
  margin-top:24px; padding-top:14px; border-top:1px solid var(--border);
  text-align:center; font-size:10px; color:var(--text3); letter-spacing:0.3px;
}

/* 승인 대기 화면 */
.pending-card{text-align:center;padding:18px 4px 8px}
.pending-icon{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg, var(--red-light) 0%, #ffe3e8 100%);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
  color:var(--red);font-size:32px;
  box-shadow:0 4px 12px rgba(200,16,46,0.15);
}
.pending-ttl{font-size:19px;font-weight:800;color:var(--navy);margin-bottom:10px;letter-spacing:-0.3px}
.pending-msg{font-size:12.5px;color:var(--text2);line-height:1.75;margin-bottom:22px}
.pending-msg b{color:var(--text)}
.btn-secondary{
  display:inline-block;padding:9px 22px;font-size:12px;font-weight:600;
  background:#fff;color:var(--text2);border:1px solid var(--border2);border-radius:7px;
  cursor:pointer; font-family:var(--font); transition:all .15s;
}
.btn-secondary:hover{background:var(--bg);border-color:var(--text3);color:var(--text)}

@media (max-width:520px){
  .frame-inner{padding:28px 22px 22px}
  .logo-circle{width:46px;height:46px;font-size:24px}
  .header-brand{font-size:16px}
}
</style>
</head>
<body>
<div class="frame">
  <div class="frame-inner">
    <!-- 로그인/회원가입 영역 -->
    <div id="auth-area">
      <div class="header">
        <div class="logo-circle" role="img" aria-label="E·LAND"></div>
        <div class="header-txt">
          <div class="header-brand">이랜드그룹 리스크 관리 시스템</div>
          <div class="header-sub">Risk Monitoring &amp; Analytics Platform</div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab on" id="tab-login" onclick="switchTab('login')">로그인</button>
        <button class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
      </div>

      <!-- 로그인 폼 -->
      <form id="form-login" onsubmit="event.preventDefault();doLogin()">
        <div class="field">
          <label class="lbl">이메일</label>
          <input type="email" class="input" id="li-email" autocomplete="username" placeholder="name@eland.co.kr" required>
        </div>
        <div class="field">
          <label class="lbl">비밀번호</label>
          <input type="password" class="input" id="li-pw" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" id="btn-login">로그인</button>
        <div class="msg" id="msg-login"></div>
      </form>

      <!-- 회원가입 폼 -->
      <form id="form-signup" onsubmit="event.preventDefault();doSignup()" style="display:none">
        <div class="row2">
          <div class="field">
            <label class="lbl">성명 *</label>
            <input type="text" class="input" id="su-name" required>
          </div>
          <div class="field">
            <label class="lbl">사번 *</label>
            <input type="text" class="input" id="su-emp" required>
          </div>
        </div>
        <div class="row2">
          <div class="field">
            <label class="lbl">소속 계열사 *</label>
            <select class="sel" id="su-div" required>
              <option value="">선택</option>
              <option>패션</option><option>유통</option><option>외식</option>
              <option>파크</option><option>건설</option><option>소법인</option>
              <option>기타</option>
            </select>
          </div>
          <div class="field">
            <label class="lbl">부서 *</label>
            <input type="text" class="input" id="su-dept" required>
          </div>
        </div>
        <div class="field">
          <label class="lbl">이메일 *</label>
          <input type="email" class="input" id="su-email" autocomplete="email" required>
        </div>
        <div class="row2">
          <div class="field">
            <label class="lbl">비밀번호 * <span style="font-weight:400;color:var(--text3)">(6자 이상)</span></label>
            <input type="password" class="input" id="su-pw" autocomplete="new-password" minlength="6" required>
          </div>
          <div class="field">
            <label class="lbl">비밀번호 확인 *</label>
            <input type="password" class="input" id="su-pw2" autocomplete="new-password" minlength="6" required>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="btn-signup">가입 신청</button>
        <div class="msg" id="msg-signup"></div>
      </form>
    </div>

    <!-- 승인 대기 화면 (가입 직후 or ?pending=1 진입 시) -->
    <div id="pending-area" style="display:none">
      <div class="header" style="margin-bottom:6px">
        <div class="logo-circle" role="img" aria-label="E·LAND"></div>
        <div class="header-txt">
          <div class="header-brand">이랜드그룹 리스크 관리 시스템</div>
          <div class="header-sub">Risk Monitoring &amp; Analytics Platform</div>
        </div>
      </div>
      <div class="pending-card">
        <div class="pending-icon">⏱</div>
        <div class="pending-ttl">관리자 승인 대기 중</div>
        <div class="pending-msg">
          가입 신청이 접수되었습니다.<br>
          <b>관리자 승인 후</b> 로그인이 가능합니다.<br>
          승인되면 다시 로그인해주세요.
        </div>
        <button class="btn-secondary" onclick="backToLogin()">로그인 화면으로</button>
      </div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://ywceavigvleurnzzeqdv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Ny1yoy5La-q9Tw7jT6pstg_SV0_fb1a';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// URL ?pending=1 진입 시 곧장 대기 화면
const params=new URLSearchParams(location.search);
if(params.get('pending')==='1') showPending();

// 이미 로그인된 상태로 들어왔다면 자동 진입(승인 확인 후)
(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(session){
    const ok=await checkApprovedAndGo(session.user);
    if(!ok){ /* 머무름 */ }
  }
})();

function switchTab(which){
  const isLogin=which==='login';
  document.getElementById('tab-login').classList.toggle('on',isLogin);
  document.getElementById('tab-signup').classList.toggle('on',!isLogin);
  document.getElementById('form-login').style.display=isLogin?'':'none';
  document.getElementById('form-signup').style.display=isLogin?'none':'';
  hideMsg('msg-login'); hideMsg('msg-signup');
}

function showMsg(id,kind,text){
  const el=document.getElementById(id);
  el.className='msg '+kind; el.textContent=text;
}
function hideMsg(id){
  const el=document.getElementById(id);
  el.className='msg'; el.textContent='';
}

function showPending(){
  document.getElementById('auth-area').style.display='none';
  document.getElementById('pending-area').style.display='';
}
function backToLogin(){
  // 대기 화면에 진입한 사용자도 다른 계정으로 로그인 가능하도록 세션 정리
  sb.auth.signOut().finally(()=>{
    history.replaceState(null,'',location.pathname);
    document.getElementById('pending-area').style.display='none';
    document.getElementById('auth-area').style.display='';
  });
}

async function doSignup(){
  const name=val('su-name'), emp=val('su-emp'), div=val('su-div'),
        dept=val('su-dept'), email=val('su-email'),
        pw=val('su-pw'), pw2=val('su-pw2');
  if(pw!==pw2){ showMsg('msg-signup','err','비밀번호가 일치하지 않습니다.'); return; }
  const btn=document.getElementById('btn-signup');
  btn.disabled=true; btn.textContent='신청 중...';
  hideMsg('msg-signup');

  const {data,error}=await sb.auth.signUp({email,password:pw});
  if(error){
    btn.disabled=false; btn.textContent='가입 신청';
    showMsg('msg-signup','err','가입 실패: '+error.message);
    return;
  }
  const uid=data.user?.id;
  if(!uid){
    btn.disabled=false; btn.textContent='가입 신청';
    showMsg('msg-signup','err','계정 생성에 실패했습니다. 다시 시도해주세요.');
    return;
  }
  // profiles 행 추가 (RLS: self_insert 정책으로 본인만 가능)
  const {error:e2}=await sb.from('profiles').insert({
    id:uid, full_name:name, emp_no:emp, division:div,
    department:dept, email:email, approved:false
  });
  btn.disabled=false; btn.textContent='가입 신청';
  if(e2){
    showMsg('msg-signup','err','프로필 저장 실패: '+e2.message);
    return;
  }
  showPending();
}

async function doLogin(){
  const email=val('li-email'), pw=val('li-pw');
  const btn=document.getElementById('btn-login');
  btn.disabled=true; btn.textContent='로그인 중...';
  hideMsg('msg-login');

  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){
    btn.disabled=false; btn.textContent='로그인';
    showMsg('msg-login','err','로그인 실패: '+(error.message||'이메일/비밀번호를 확인해주세요.'));
    return;
  }
  const ok=await checkApprovedAndGo(data.user);
  if(!ok){ btn.disabled=false; btn.textContent='로그인'; }
}

async function checkApprovedAndGo(user){
  const {data:profile,error}=await sb.from('profiles')
    .select('approved,email').eq('id',user.id).maybeSingle();
  if(error||!profile){
    showMsg('msg-login','err','프로필 조회 실패. 관리자에게 문의해주세요.');
    await sb.auth.signOut();
    return false;
  }
  if(!profile.approved){
    showPending();
    return false;
  }
  // 통과: 대시보드로
  location.replace('index.html');
  return true;
}

function val(id){return document.getElementById(id).value.trim();}
</script>
</body>
</html>
