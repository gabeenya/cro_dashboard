<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — 이랜드그룹 리스크 관리 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --red:#c8102e; --red-dark:#9e0c24; --red-light:#fdf0f2;
  --navy:#1a2744; --navy2:#243460;
  --bg:#f7f8fa; --surface:#ffffff;
  --border:#dde1ea; --border2:#c8cdd9;
  --text:#111827; --text2:#4b5563; --text3:#9ca3af;
  --font:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; font-family:var(--font); color:var(--text); font-size:13px;
  background:linear-gradient(135deg,#1a2744 0%,#243460 50%,#0f1a30 100%);
  display:flex; align-items:center; justify-content:center; padding:24px;
}
.frame{
  width:100%; max-width:420px; background:var(--surface);
  border-radius:14px; box-shadow:0 18px 50px rgba(0,0,0,0.32);
  padding:36px 36px 28px;
}
.brand-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.brand-bar{width:4px;height:22px;background:var(--red);border-radius:2px}
.brand{font-size:13px;font-weight:700;color:var(--navy);letter-spacing:0.4px}
.ttl{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-0.5px;margin:4px 0 2px}
.sub{font-size:11px;color:var(--text3);margin-bottom:22px}

/* 탭 */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:4px}
.tab{
  flex:1;padding:10px 0;font-size:13px;font-weight:600;color:var(--text3);
  background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;
  font-family:var(--font);
}
.tab.on{color:var(--red);border-bottom-color:var(--red)}

/* 폼 */
.field{margin-bottom:12px}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--text2);letter-spacing:0.3px;margin-bottom:4px}
.input,.sel{
  width:100%;padding:9px 11px;font-size:13px;color:var(--text);
  border:1px solid var(--border);border-radius:6px;background:#fff;
  font-family:var(--font); outline:none; transition:border-color .15s;
}
.input:focus,.sel:focus{border-color:var(--navy)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.btn-primary{
  width:100%;padding:11px;margin-top:10px;font-size:13px;font-weight:700;
  background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer;
  font-family:var(--font); letter-spacing:0.4px;
}
.btn-primary:hover{background:var(--red-dark)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}

.msg{
  margin-top:12px;padding:9px 10px;font-size:11px;border-radius:6px;
  display:none; line-height:1.5;
}
.msg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;display:block}
.msg.ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;display:block}
.msg.info{background:#eff6ff;color:#1e3a8a;border:1px solid #bfdbfe;display:block}

.foot{margin-top:20px;text-align:center;font-size:10px;color:var(--text3)}

/* 승인 대기 화면 */
.pending-card{text-align:center;padding:18px 4px 6px}
.pending-icon{
  width:54px;height:54px;border-radius:50%;background:var(--red-light);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  color:var(--red);font-size:28px;font-weight:700;
}
.pending-ttl{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:8px}
.pending-msg{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:18px}
.pending-msg b{color:var(--text)}
.btn-secondary{
  display:inline-block;padding:8px 18px;font-size:11px;font-weight:600;
  background:#fff;color:var(--text2);border:1px solid var(--border2);border-radius:6px;
  cursor:pointer; font-family:var(--font);
}
.btn-secondary:hover{background:var(--bg)}
</style>
</head>
<body>
<div class="frame">
  <!-- 로그인/회원가입 영역 -->
  <div id="auth-area">
    <div class="brand-row"><div class="brand-bar"></div><div class="brand">이랜드그룹</div></div>
    <div class="ttl">리스크 관리 시스템</div>
    <div class="sub">Risk Monitoring &amp; Analytics</div>

    <div class="tabs">
      <button class="tab on" id="tab-login" onclick="switchTab('login')">로그인</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
    </div>

    <!-- 로그인 폼 -->
    <form id="form-login" onsubmit="event.preventDefault();doLogin()">
      <div class="field">
        <label class="lbl">이메일</label>
        <input type="email" class="input" id="li-email" autocomplete="username" required>
      </div>
      <div class="field">
        <label class="lbl">비밀번호</label>
        <input type="password" class="input" id="li-pw" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary" id="btn-login">로그인</button>
      <div class="msg" id="msg-login"></div>
    </form>

    <!-- 회원가입 폼 -->
    <form id="form-signup" onsubmit="event.preventDefault();doSignup()" style="display:none">
      <div class="row2">
        <div class="field">
          <label class="lbl">성명 *</label>
          <input type="text" class="input" id="su-name" required>
        </div>
        <div class="field">
          <label class="lbl">사번 *</label>
          <input type="text" class="input" id="su-emp" required>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label class="lbl">소속 계열사 *</label>
          <select class="sel" id="su-div" required>
            <option value="">선택</option>
            <option>패션</option><option>유통</option><option>외식</option>
            <option>파크</option><option>건설</option><option>소법인</option>
            <option>기타</option>
          </select>
        </div>
        <div class="field">
          <label class="lbl">부서 *</label>
          <input type="text" class="input" id="su-dept" required>
        </div>
      </div>
      <div class="field">
        <label class="lbl">이메일 *</label>
        <input type="email" class="input" id="su-email" autocomplete="email" required>
      </div>
      <div class="row2">
        <div class="field">
          <label class="lbl">비밀번호 * <span style="font-weight:400;color:var(--text3)">(6자 이상)</span></label>
          <input type="password" class="input" id="su-pw" autocomplete="new-password" minlength="6" required>
        </div>
        <div class="field">
          <label class="lbl">비밀번호 확인 *</label>
          <input type="password" class="input" id="su-pw2" autocomplete="new-password" minlength="6" required>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="btn-signup">가입 신청</button>
      <div class="msg" id="msg-signup"></div>
    </form>
  </div>

  <!-- 승인 대기 화면 (가입 직후 or ?pending=1 진입 시) -->
  <div id="pending-area" style="display:none">
    <div class="pending-card">
      <div class="pending-icon">⏱</div>
      <div class="pending-ttl">관리자 승인 대기 중</div>
      <div class="pending-msg">
        가입 신청이 접수되었습니다.<br>
        <b>관리자 승인 후</b> 로그인이 가능합니다.<br>
        승인되면 다시 로그인해주세요.
      </div>
      <button class="btn-secondary" onclick="backToLogin()">로그인 화면으로</button>
    </div>
  </div>

  <div class="foot">© 이랜드그룹 리스크 관리 시스템</div>
</div>

<script>
const SUPABASE_URL = 'https://ywceavigvleurnzzeqdv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Ny1yoy5La-q9Tw7jT6pstg_SV0_fb1a';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// URL ?pending=1 진입 시 곧장 대기 화면
const params=new URLSearchParams(location.search);
if(params.get('pending')==='1') showPending();

// 이미 로그인된 상태로 들어왔다면 자동 진입(승인 확인 후)
(async()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(session){
    const ok=await checkApprovedAndGo(session.user);
    if(!ok){ /* 머무름 */ }
  }
})();

function switchTab(which){
  const isLogin=which==='login';
  document.getElementById('tab-login').classList.toggle('on',isLogin);
  document.getElementById('tab-signup').classList.toggle('on',!isLogin);
  document.getElementById('form-login').style.display=isLogin?'':'none';
  document.getElementById('form-signup').style.display=isLogin?'none':'';
  hideMsg('msg-login'); hideMsg('msg-signup');
}

function showMsg(id,kind,text){
  const el=document.getElementById(id);
  el.className='msg '+kind; el.textContent=text;
}
function hideMsg(id){
  const el=document.getElementById(id);
  el.className='msg'; el.textContent='';
}

function showPending(){
  document.getElementById('auth-area').style.display='none';
  document.getElementById('pending-area').style.display='';
}
function backToLogin(){
  // 대기 화면에 진입한 사용자도 다른 계정으로 로그인 가능하도록 세션 정리
  sb.auth.signOut().finally(()=>{
    history.replaceState(null,'',location.pathname);
    document.getElementById('pending-area').style.display='none';
    document.getElementById('auth-area').style.display='';
  });
}

async function doSignup(){
  const name=val('su-name'), emp=val('su-emp'), div=val('su-div'),
        dept=val('su-dept'), email=val('su-email'),
        pw=val('su-pw'), pw2=val('su-pw2');
  if(pw!==pw2){ showMsg('msg-signup','err','비밀번호가 일치하지 않습니다.'); return; }
  const btn=document.getElementById('btn-signup');
  btn.disabled=true; btn.textContent='신청 중...';
  hideMsg('msg-signup');

  const {data,error}=await sb.auth.signUp({email,password:pw});
  if(error){
    btn.disabled=false; btn.textContent='가입 신청';
    showMsg('msg-signup','err','가입 실패: '+error.message);
    return;
  }
  const uid=data.user?.id;
  if(!uid){
    btn.disabled=false; btn.textContent='가입 신청';
    showMsg('msg-signup','err','계정 생성에 실패했습니다. 다시 시도해주세요.');
    return;
  }
  // profiles 행 추가 (RLS: self_insert 정책으로 본인만 가능)
  const {error:e2}=await sb.from('profiles').insert({
    id:uid, full_name:name, emp_no:emp, division:div,
    department:dept, email:email, approved:false
  });
  btn.disabled=false; btn.textContent='가입 신청';
  if(e2){
    showMsg('msg-signup','err','프로필 저장 실패: '+e2.message);
    return;
  }
  showPending();
}

async function doLogin(){
  const email=val('li-email'), pw=val('li-pw');
  const btn=document.getElementById('btn-login');
  btn.disabled=true; btn.textContent='로그인 중...';
  hideMsg('msg-login');

  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){
    btn.disabled=false; btn.textContent='로그인';
    showMsg('msg-login','err','로그인 실패: '+(error.message||'이메일/비밀번호를 확인해주세요.'));
    return;
  }
  const ok=await checkApprovedAndGo(data.user);
  if(!ok){ btn.disabled=false; btn.textContent='로그인'; }
}

async function checkApprovedAndGo(user){
  const {data:profile,error}=await sb.from('profiles')
    .select('approved,email').eq('id',user.id).maybeSingle();
  if(error||!profile){
    showMsg('msg-login','err','프로필 조회 실패. 관리자에게 문의해주세요.');
    await sb.auth.signOut();
    return false;
  }
  if(!profile.approved){
    showPending();
    return false;
  }
  // 통과: 대시보드로
  location.replace('index.html');
  return true;
}

function val(id){return document.getElementById(id).value.trim();}
</script>
</body>
</html>
